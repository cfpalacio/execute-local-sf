AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SmartPay Liquidacion - Step Functions Orchestrator

Parameters:
  Environment:
    Type: String
    Default: local
    AllowedValues:
      - local
      - qa
      - prod

  LambdaCalculoIngresosArn:
    Type: String
    Description: ARN de la Lambda de calculo de ingresos

  LambdaCalculoBaseGravableArn:
    Type: String
    Description: ARN de la Lambda de calculo de base gravable

  LambdaCalculoSeguridadSocialArn:
    Type: String
    Description: ARN de la Lambda de calculo de seguridad social

  LambdaCalculoOtrasDeduccionesArn:
    Type: String
    Description: ARN de la Lambda de calculo de otras deducciones

  LambdaCalculoCapacidadEndeudamientoArn:
    Type: String
    Description: ARN de la Lambda de calculo de capacidad de endeudamiento

  LambdaCalculoFechaPagoArn:
    Type: String
    Description: ARN de la Lambda de calculo de fecha de pago

  LambdaEscrituraDynamoArn:
    Type: String
    Description: ARN de la Lambda de escritura a DynamoDB

  LambdaLecturaChunkArn:
    Type: String
    Description: ARN de la Lambda de lectura de chunks

  StepfunctionLiquidationResponseQueueUrl:
    Type: String
    Description: URL de la SQS para respuestas de liquidacion


Resources:
  StepFunctionsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'smartpay-liquidacion-sfn-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Ref LambdaCalculoIngresosArn
                  - !Ref LambdaCalculoBaseGravableArn
                  - !Ref LambdaCalculoSeguridadSocialArn
                  - !Ref LambdaCalculoOtrasDeduccionesArn
                  - !Ref LambdaCalculoCapacidadEndeudamientoArn
                  - !Ref LambdaCalculoFechaPagoArn
                  - !Ref LambdaEscrituraDynamoArn
                  - !Ref LambdaLecturaChunkArn
        - PolicyName: SendSQSMessagePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !Ref StepfunctionLiquidationResponseQueueArn
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: '*'

  LiquidacionStateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/stepfunctions/smartpay-liquidacion-${Environment}'
      RetentionInDays: 14

  LiquidacionStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub 'smartpay-flujo-liquidacion-${Environment}'
      DefinitionUri: statemachine/liquidacion.asl.json
      DefinitionSubstitutions:
        LambdaCalculoIngresosArn: !Ref LambdaCalculoIngresosArn
        LambdaCalculoBaseGravableArn: !Ref LambdaCalculoBaseGravableArn
        LambdaCalculoSeguridadSocialArn: !Ref LambdaCalculoSeguridadSocialArn
        LambdaCalculoOtrasDeduccionesArn: !Ref LambdaCalculoOtrasDeduccionesArn
        LambdaCalculoCapacidadEndeudamientoArn: !Ref LambdaCalculoCapacidadEndeudamientoArn
        LambdaCalculoFechaPagoArn: !Ref LambdaCalculoFechaPagoArn
        LambdaEscrituraDynamoArn: !Ref LambdaEscrituraDynamoArn
        LambdaLecturaChunkArn: !Ref LambdaLecturaChunkArn
        StepfunctionLiquidationResponseQueueUrl: !Ref StepfunctionLiquidationResponseQueueUrl
      Role: !GetAtt StepFunctionsExecutionRole.Arn
      Logging:
        Level: ALL
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt LiquidacionStateMachineLogGroup.Arn
      Tags:
        Proyecto: SmartPay
        Producto: Liquidacion
        Environment: !Ref Environment

Outputs:
  StateMachineArn:
    Description: ARN de la maquina de estados de liquidacion
    Value: !Ref LiquidacionStateMachine

  StateMachineName:
    Description: Nombre de la maquina de estados
    Value: !GetAtt LiquidacionStateMachine.Name
